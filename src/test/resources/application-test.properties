# Test configuration - disable automatic GTFS loading on startup
# The test will manually invoke the download method
spring.profiles.active=test

# Set dummy values to enable the bean creation
gtfs.static-url=https://data.opentransportdata.swiss/dataset/timetable-2026-gtfs2020
gtfs.api-token=test-token
gtfs.local-zip-path=/tmp/gtfs-test.zip
# Disable scheduled reload
gtfs.reload-cron=0 0 0 * * ? 2099
