name: CI/CD Pipeline
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  sonar:
    name: SonarQube
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'
      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle') }}
          restore-keys: ${{ runner.os }}-gradle
      - name: Make gradlew executable
        run: chmod +x gradlew
      - name: Build and analyze
        env:
          GEOPS_API_KEY: ${{ secrets.GEOPS_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./gradlew build sonar --info

  pr-test:
    name: PR Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4
      - name: Make gradlew executable
        run: chmod +x gradlew
      - name: Install Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Build with Gradle
        run: ./gradlew build
      - name: Test with Gradle
        run: ./gradlew test

  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    needs: [sonar, pr-test]
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository code (full history for tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
      - name: Install release deps
        run: npm ci
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release

  dockerize:
    name: Dockerize
    runs-on: ubuntu-latest
    needs: release
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      DOCKER_BUILDKIT: 1
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      - name: Build and push for x64_86 processor architecture
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPO_NAME }}:latest
          platforms: linux/amd64
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPO_NAME }}:cache
          cache-to: type=inline,mode=max

  deploy:
    name: Deploy to App Engine
    runs-on: ubuntu-latest
    needs: dockerize
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Inject secrets into app.yaml
        run: |
          sed -i "s/GEOP_API_KEY_PLACEHOLDER/${{ secrets.GEOPS_API_KEY }}/g" app.yaml
          sed -i "s/BROKER_HOST_PLACEHOLDER/${{ secrets.BROKER_HOST }}/g" app.yaml
          sed -i "s/BROKER_USER_PLACEHOLDER/${{ secrets.BROKER_USER }}/g" app.yaml
          sed -i "s/BROKER_PASS_PLACEHOLDER/${{ secrets.BROKER_PASS }}/g" app.yaml
      - name: Deploy to App Engine
        id: deploy
        uses: google-github-actions/deploy-appengine@v0.2.0
        with:
          deliverables: app.yaml
          version: v1
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          credentials: ${{ secrets.GCP_SERVICE_CREDENTIALS }}
      - name: Test
        run: curl "${{ steps.deploy.outputs.url }}"