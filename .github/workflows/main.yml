name: Deploy Project to App Engine

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  test:
    name: Test and SonarQube
    runs-on: ubuntu-latest
    env:
      GEOPS_API_KEY: ${{ secrets.GEOPS_API_KEY }}

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Install Java 17
        uses: actions/setup-java@v3
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Test and analyze
        run: ./gradlew test jacocoTestReport sonar
        env:
          GEOPS_API_KEY: ${{ secrets.GEOPS_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  release:
    if: github.actor != 'github-actions[bot]'
    name: Semantic Release
    runs-on: ubuntu-latest
    # needs: test
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository code (full history for tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install release deps
        run: npm ci

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release

  deploy:
    name: Deploying to Google Cloud
    runs-on: ubuntu-latest
    # needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Inject Secret into app.yaml
        run: |
          sed -i "s/GEOP_API_KEY_PLACEHOLDER/${{ secrets.GEOPS_API_KEY }}/g" app.yaml
        # 'sed -i' means "edit in-place"
        # 's/find/replace/g' is the substitute command

      - name: Deploy to App Engine
        id: deploy
        uses: google-github-actions/deploy-appengine@v0.2.0
        with:
          deliverables: app.yaml
          version: v1
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          credentials: ${{ secrets.GCP_SERVICE_CREDENTIALS }}

      - name: Test
        run: curl "${{ steps.deploy.outputs.url }}"